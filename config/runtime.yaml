# Runtime configuration for ad-review-layered-decision
# Controls media preprocessing, OCR/ASR/QR toggles, and LLM mode.

max_sampled_frames: 12
sample_interval_sec: 1
phash_resize: 64
enable_ocr: false
enable_asr: true
asr_model_size: small
asr_device: auto
asr_compute_type: int8_float16
enable_qr: true
enable_text_embedding: true
llm_enabled: auto
